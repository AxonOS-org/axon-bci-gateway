name: ci

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-contract:
    name: repository contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: python3 tools/gateway_ci_checks.py repository-contract

  required-structure:
    name: required structure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
