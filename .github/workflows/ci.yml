name: ci

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gateway-contract:
    name: gateway contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify AxonOS gateway contract
        run: python3 tools/verify_gateway_contract.py

  repository-layout:
    name: repository layout
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check fork structure
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f CHANGELOG.md
          test -f NOTICE
          test -f LICENSE
          test -f OpenBCI_GUI/OpenBCI_GUI.pde
          test -d GuiUnitTests
          test -d Networking-Test-Kit
          echo "Repository layout: PASS"

  docs-contract:
    name: documentation contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check documentation claims
        shell: bash
        run: |
          set -euo pipefail
          grep -q "integration fork" README.md
          grep -q "OpenBCI" README.md
          grep -q "AxonOS" README.md
          grep -q "OpenBCI" NOTICE
          grep -q "MIT" NOTICE
          grep -q "connect@axonos.org" README.md
          ! grep -q "info@axonos.org" README.md
          ! grep -q "AxonOS-sdk" README.md
          ! grep -q "AxonOS-kernel" README.md
          echo "Documentation contract: PASS"
